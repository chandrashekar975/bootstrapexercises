<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="h1 text-center text-danger text-decoration-underline">Contextual Button Types</div>
    <div class="h2 text-center text-dark mt-5">Solid Contextual Button Types</div>
    <div class="container text-center">
        <div class="btn-group">
            <button type="button" class="btn btn-primary">Primary</button>
            <button type="button" class="btn btn-secondary">Secondary</button>
            <button type="button" class="btn btn-success">Success</button>
            <button type="button" class="btn btn-danger">Danger</button>
            <button type="button" class="btn btn-warning">Warning</button>
            <button type="button" class="btn btn-info">Info</button>
            <button type="button" class="btn btn-light">Light</button>
            <button type="button" class="btn btn-dark">Dark</button>
        </div>
    </div>

    <div class="h2 text-center text-dark mt-5">Outline Contextual Button Types</div>
    <div class="container text-center">
        <div class="btn-group">
            <button type="button" class="btn btn-outline-primary">Primary</button>
            <button type="button" class="btn btn-outline-secondary">Secondary</button>
            <button type="button" class="btn btn-outline-success">Success</button>
            <button type="button" class="btn btn-outline-danger">Danger</button>
            <button type="button" class="btn btn-outline-warning">Warning</button>
            <button type="button" class="btn btn-outline-info">Info</button>
            <button type="button" class="btn btn-outline-light">Light</button>
            <button type="button" class="btn btn-outline-dark">Dark</button>
        </div>
    </div>

    <div class="h2 text-center text-dark mt-5">Toggle Buttons with Checkboxes</div>
    <div class="text-center">
        <div class="btn-group">
            <input type="checkbox" class="btn-check" id="check1" autocomplete="off">
            <label class="btn btn-outline-primary" for="check1">Option1</label>
            <input type="checkbox" class="btn-check" id="check2" autocomplete="off">
            <label class="btn btn-outline-primary" for="check2">Option2</label>
            <input type="checkbox" class="btn-check" id="check3" autocomplete="off">
            <label class="btn btn-outline-primary" for="check3">Option3</label>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
