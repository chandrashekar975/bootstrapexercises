<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordering Columns</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="h1 text-center fw-bold fst-italic">
        Ordering Columns
    </div>
    <div class="container">
        <div class="row justify-content-center align-items-center" style="height: 100px;">
            <div class="col border order-md-0 order-lg-5">Column1</div>
            <div class="col border order-md-1 order-lg-4">Column2</div>
            <div class="col border order-md-2 order-lg-3">Column3</div>
            <div class="col border order-md-3 order-lg-2">Column4</div>
            <div class="col border order-md-4 order-lg-1">Column5</div>
            <div class="col border order-md-5 order-lg-0">Column6</div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script> 
</body>
</html>
