<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light">
    <div class="h1 text-center fw-bold text-decoration-underline">
        Student Profile Card
    </div>

    <div class="card col-9 col-sm-6 col-md-5 col-lg-3 mx-auto my-5 text-bg-light border-dark shadow">
        <div class="card-header fw-bold">
            CVR College of Engineering
        </div>
        <img src="profile.jpg" class="card-img-top" alt="Profile Picture" style="height: 320px; object-fit: cover;">
        <div class="card-body text-center">
            <div class="card-title text-success fw-bold mb-3 h3">
                Student Details
            </div>
            <ul class="list-group list-group-flush">
                <li class="list-group-item bg-transparent px-0"><strong>Name:</strong> John Doe</li>
                <li class="list-group-item bg-transparent px-0"><strong>Roll Number:</strong> 23B81A6214</li>
                <li class="list-group-item bg-transparent px-0"><strong>Contact:</strong> +91 903 852 3598</li>
            </ul>
        </div>
        <div class="card-footer text-muted">
            1 day ago
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
